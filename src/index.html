<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="output.css">
    <link rel="stylesheet" href="font.css">
    <title>Home | Lentera</title>
</head>
<body>
    <header>
        <nav class="px-[90px] mt-[40px] flex items-center justify-between">
            <div>
                <img src="assets/images/logos/logo.svg" alt="" class="w-[50px] h-[50px]">
            </div>
            <div>
                <ul class="text-[18px] flex items-center gap-x-[57px] text-[#999999]">
                    <li class="font-medium text-black"><a href="">Home</a></li>
                    <li class="hover:font-medium hover:text-black duration-300 transition-all"><a href="">Location</a></li>
                    <li class="hover:font-medium hover:text-black duration-300 transition-all"><a href="">Success</a></li>
                    <li class="hover:font-medium hover:text-black duration-300 transition-all"><a href="">Features</a></li>
                    <li class="hover:font-medium hover:text-black duration-300 transition-all"><a href="">Account</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <main>
        <section class="">
            <div class="w-full flex justify-between">
                <div class="ps-[90px] mt-[100px]">
                    <h1 class="text-[48px] font-semibold max-w-[499px]">We have thousand of your dream home</h1>
                    <p class="mt-[16px] text-[18px] font-normal max-w-[400px] leading-[36px] text-[#999999]">A light that will guide you to find what you’ve been looking for long long time ago</p>
                    <div class="mt-[43px] flex items-center gap-x-[40px]">
                        <div class="flex flex-col">
                            <h4 class="text-black text-[32px] leading-[36px] font-medium">52<span class="text-[#8080FF]">K</span></h4>
                            <p class="mt-[4px] text-[#999999] text-[18px]">success</p>
                        </div>
                        <div class="flex flex-col">
                            <h4 class="text-black text-[32px] leading-[36px] font-medium">18<span class="text-[#8080FF]">K</span></h4>
                            <p class="mt-[4px] text-[#999999] text-[18px]">apartment</p>
                        </div>
                        <div class="flex flex-col">
                            <h4 class="text-black text-[32px] leading-[36px] font-medium">14<span class="text-[#8080FF]">M</span></h4>
                            <p class="mt-[4px] text-[#999999] text-[18px]">transactions</p>
                        </div>
                    </div>
                    <div class="mt-[47px]">
                        <form action="">
                            <div class="flex flex-col">
                                <label for="location" class="text-[18px] text-[#999999]">Location</label>
                                <select name="location" id="location" class="appearance-none w-[438px] h-[50px] bg-[#F7F7F9] ps-[14px] mt-[6px]">
                                    <option value="">Sawangan Golf, Padalarangan</option>
                                    <option value="">Pakuwon Golf, Surabaya</option>
                                </select>
                            </div>
                            <div class="mt-[20px]">
                                <button type="submit" class="px-[30px] py-[11.5px] bg-[#FF9376]  text-[18px] font-medium text-white">Explore Now</button>
                            </div>
                        </form>
                    </div>
                </div>
                <div class="relative flex justify-end mt-[9px]">
                    <div class="flex justify-end overflow-hidden w-full relative z-40">
                        <img src="assets/images/photos/house.png" alt="" class=" w-[813px] h-[757px]">
                    </div>
                    <div class="bg-[#8080FF] w-[774px] h-[503px] absolute bottom-0 z-0"></div>
                    <div class="bg-white w-[774px] h-[24px]  absolute bottom-0 z-50"></div>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
